<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يوسف محمد - المساعد الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --accent: #ffffff;
            --border: #1a1a1a;
            --text-dim: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* Matching font weights and sizes for both names */
        .nav-right, .nav-left { 
            font-weight: 900; 
            font-size: 1.4rem; 
            color: #fff; 
            letter-spacing: -0.5px;
        }

        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }

        .page { display: none; }
        .page.active { display: block !important; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ai-section {
            background: linear-gradient(135deg, #080808, #111); 
            border: 1px solid #222;
            padding: 25px; border-radius: 20px; margin-top: 20px;
        }

        .ai-input { 
            flex: 1; padding: 12px 18px; background: #000; border: 1px solid #333; 
            color: #fff; border-radius: 12px; outline: none; transition: 0.3s; 
        }
        .ai-input:focus { border-color: #fff; }

        .ai-response { 
            margin-top: 20px; padding: 18px; background: rgba(255,255,255,0.03); 
            border-radius: 15px; font-size: 0.95rem; line-height: 1.8; display: none; 
            border: 1px solid #222; color: #ddd; white-space: pre-wrap;
        }

        .main-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 25px; }
        
        .menu-card {
            background: var(--card-bg); border: 1px solid var(--border); padding: 30px 20px;
            border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .menu-card:hover { border-color: #fff; transform: translateY(-4px); background: #0f0f0f; }

        .unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        
        .unit-item {
            background: var(--card-bg); border: 1px solid var(--border); padding: 15px;
            border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        /* White/Black selected state for Units */
        .unit-item.selected { 
            border-color: #fff; 
            background: #fff !important; 
            color: #000 !important; 
            font-weight: 900; 
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: right; padding: 12px; border-bottom: 2px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn {
            background: #fff; color: #000; padding: 12px 25px; border-radius: 12px;
            border: none; cursor: pointer; font-weight: 900; transition: 0.2s; 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { background: #e0e0e0; transform: scale(1.02); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        .btn-outline { background: none; color: #fff; border: 1px solid #333; font-weight: 400; }
        .btn-outline:hover { border-color: #fff; background: rgba(255,255,255,0.05); }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }
        .modal-content { background: #0a0a0a; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid #222; }

        .loading-spinner {
            border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff;
            border-radius: 50%; width: 22px; height: 22px; animation: spin 0.8s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .score-circle {
            width: 120px; height: 120px; border-radius: 50%; border: 4px solid #fff;
            display: flex; align-items: center; justify-content: center;
            margin: 20px auto; font-size: 2rem; font-weight: 900; color: #fff;
        }

        .activity-box {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 25px;
            padding: 40px 20px; text-align: center; min-height: 400px; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
        
        .q-text { font-size: 1.8rem; font-weight: 700; margin-bottom: 30px; }
        
        .ans-input {
            width: 100%; max-width: 400px; padding: 16px;
            background: #000; border: 2px solid #333; border-radius: 15px;
            color: #fff; text-align: center; font-size: 1.2rem; outline: none; transition: 0.3s;
        }
        .ans-input:focus { border-color: #fff; }

        .story-container {
            line-height: 2; font-size: 1.1rem; color: #ccc; text-align: justify; white-space: pre-wrap;
        }
        
        .mnemonic-box { font-style: italic; color: #fff; font-size: 0.85rem; margin-top: 5px; border-right: 2px solid #fff; padding-right: 8px; }

        .tag {
            background: #111; border: 1px solid #333; padding: 6px 12px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-size: 0.8rem;
        }
        /* White/Black state for Tags */
        .tag.selected { background: #fff !important; color: #000 !important; font-weight: 900; border-color: #fff; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-right">يوسف محمد</div>
        <div class="nav-left">Yousef Mohamed</div>
    </div>

    <div class="container">
        <div id="page-home" class="page active">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-black">الرئيسية</h1>
                <button class="btn text-sm px-5" onclick="openAddModal()">إضافة كلمة +</button>
            </div>

            <div class="ai-section">
                <div class="flex items-center gap-2 mb-3">
                    <h3 class="font-black text-sm text-gray-400">اسأل يوسف الذكي 🤖</h3>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="ai-chat-input" class="ai-input" placeholder="اكتب سؤالك هنا...">
                    <button class="btn py-2 px-6" onclick="askAIChat()">اسأل</button>
                </div>
                <div id="ai-chat-response" class="ai-response"></div>
            </div>

            <div class="main-menu">
                <div class="menu-card" onclick="openWords()">
                    <h3 class="text-lg font-bold">الكلمات</h3>
                </div>
                <div class="menu-card" onclick="startSetup('dictation')">
                    <h3 class="text-lg font-bold">تسميع</h3>
                </div>
                <div class="menu-card" onclick="startSetup('flashcards')">
                    <h3 class="text-lg font-bold">Flash Cards</h3>
                </div>
                <div class="menu-card" onclick="startSetup('exam')">
                    <h3 class="text-lg font-bold">امتحانات AI 🤖</h3>
                </div>
            </div>
        </div>

        <div id="page-words" class="page">
            <span class="cursor-pointer text-gray-500 mb-4 inline-block hover:text-white text-sm" onclick="goHome()">← العودة للرئيسية</span>
            <div class="flex justify-between items-center mb-5">
                <h2 class="text-xl font-black">الوحدات الدراسية</h2>
                <button id="story-gen-btn" class="btn btn-outline text-xs py-2" style="display:none" onclick="generateUnitStory()">
                    توليد قصة بالكلمات ✨
                </button>
            </div>
            <div class="unit-grid" id="words-unit-grid"></div>
            
            <div id="unit-table-container" style="display: none;" class="mt-8">
                <h3 id="current-unit-title" class="text-lg font-bold mb-4 border-r-4 border-white pr-3"></h3>
                <div id="unit-ai-box" class="ai-response mb-4 bg-white/5 border-white/10"></div>
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr><th>الكلمة</th><th>المعنى</th><th>شرح ✨</th><th>حذف</th></tr>
                        </thead>
                        <tbody id="words-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="page-setup" class="page">
            <span class="cursor-pointer text-gray-500 mb-4 inline-block hover:text-white text-sm" onclick="goHome()">← إلغاء</span>
            <h2 id="setup-title" class="text-xl font-black mb-5">إعداد النشاط</h2>
            
            <div class="mb-6">
                <h4 class="mb-3 font-bold text-sm text-gray-400">1. اختر الوحدات:</h4>
                <div class="unit-grid" id="setup-unit-grid"></div>
            </div>

            <div id="word-selection-area" style="display: none;" class="mt-8">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="font-bold text-sm text-gray-400">2. تخصيص الكلمات:</h4>
                    <div class="flex gap-2">
                        <button class="btn btn-outline text-[10px] px-2 py-1" onclick="manageSelection(true)">اختيار الكل</button>
                        <button class="btn btn-outline text-[10px] px-2 py-1" onclick="manageSelection(false)">إلغاء الكل</button>
                    </div>
                </div>
                
                <div id="word-tag-list" class="flex flex-wrap gap-2 mb-6 p-4 bg-[#080808] rounded-xl border border-[#1a1a1a]"></div>
                
                <div id="dictation-options" style="display: none;" class="mb-6">
                    <p class="text-gray-500 mb-2 text-xs">اتجاه الترجمة:</p>
                    <select id="dict-dir" class="ai-input w-full text-sm">
                        <option value="arb-eng">من عربي إلى إنجليزي</option>
                        <option value="eng-arb">من إنجليزي إلى عربي</option>
                    </select>
                </div>

                <button class="btn w-full py-4 text-md" id="launch-btn" onclick="runActivity()">ابدأ النشاط ✨</button>
            </div>
        </div>

        <div id="page-activity" class="page">
            <div class="activity-box">
                <div id="activity-header" class="mb-6 text-gray-500 text-sm font-bold"></div>
                <div id="activity-main" class="w-full"></div>
                <div id="activity-story" class="hidden w-full text-right">
                    <div id="story-content" class="story-container mb-6 p-4 bg-white/5 rounded-xl border border-white/10"></div>
                    <button class="btn w-full" onclick="goHome()">العودة للرئيسية</button>
                </div>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-lg font-bold mb-5">إضافة كلمة جديدة</h3>
            <div class="relative mb-3">
                <input type="text" id="new-eng" class="ai-input w-full" placeholder="الكلمة بالإنجليزية">
                <button class="absolute left-2 top-2 text-[10px] bg-white/10 px-2 py-1 rounded hover:bg-white/20" onclick="aiSuggestMeaning()">
                    تعبئة ذكية 🤖
                </button>
            </div>
            <input type="text" id="new-arb" class="ai-input w-full mb-3" placeholder="المعنى بالعربي">
            <select id="new-unit" class="ai-input w-full mb-5">
                <script>for(let i=1; i<=12; i++) document.write(`<option value="${i}">الوحدة ${i}</option>`);</script>
            </select>
            <button class="btn w-full mb-3" onclick="saveNewWord()">حفظ</button>
            <button class="btn btn-outline w-full" onclick="closeAddModal()">إغلاق</button>
        </div>
    </div>

    <script>
        // OpenAI Key from User
        const API_KEY = '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';
        const MODEL_NAME = 'gpt-4o-mini';
        
        let words = JSON.parse(localStorage.getItem('yousef_words')) || [
            { eng: 'Piracy', arb: 'قرصنة', unit: 1 },
            { eng: 'Cheat', arb: 'يغش', unit: 1 },
            { eng: 'Impulse', arb: 'دافع', unit: 2 },
            { eng: 'Constant', arb: 'ثابت', unit: 3 }
        ];

        let mode = '', selectedUnits = [], sessionWords = [], wordsPool = [], currentIdx = 0, score = 0;
        let aiQuestions = [];
        let isProcessing = false;
        let activeUnit = null;

        function init() { renderGrids(); }
        function saveData() { localStorage.setItem('yousef_words', JSON.stringify(words)); }
        
        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }
        
        function goHome() { navTo('page-home'); }
        function openWords() { renderGrids(); navTo('page-words'); }

        function renderGrids() {
            const wordsGrid = document.getElementById('words-unit-grid');
            const setupGrid = document.getElementById('setup-unit-grid');
            wordsGrid.innerHTML = '';
            setupGrid.innerHTML = '';

            for (let i = 1; i <= 12; i++) {
                const btn1 = document.createElement('div');
                btn1.className = 'unit-item';
                btn1.innerText = `وحدة ${i}`;
                btn1.onclick = (e) => {
                    document.querySelectorAll('#words-unit-grid .unit-item').forEach(el => el.classList.remove('selected'));
                    e.currentTarget.classList.add('selected');
                    showUnit(i);
                };
                wordsGrid.appendChild(btn1);

                const btn2 = document.createElement('div');
                btn2.className = 'unit-item';
                btn2.innerText = `وحدة ${i}`;
                btn2.id = `unit-setup-${i}`;
                btn2.onclick = () => toggleUnit(i, btn2);
                setupGrid.appendChild(btn2);
            }
        }

        function showUnit(u) {
            activeUnit = u;
            document.getElementById('story-gen-btn').style.display = 'block';
            document.getElementById('unit-table-container').style.display = 'block';
            document.getElementById('current-unit-title').innerText = `كلمات الوحدة ${u}`;
            
            const tbody = document.getElementById('words-body');
            tbody.innerHTML = '';
            words.filter(w => w.unit === u).forEach(w => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-bold">
                        ${w.eng}
                        <div id="mnemonic-${w.eng.replace(/\s/g, '')}" class="mnemonic-box"></div>
                    </td>
                    <td>${w.arb}</td>
                    <td>
                        <div class="flex gap-1">
                            <button class="text-xs bg-white/5 p-1 rounded hover:bg-white/10" onclick="getInsight('${w.eng}')">شرح ✨</button>
                            <button class="text-xs bg-white/5 p-1 rounded hover:bg-white/10" onclick="getMnemonic('${w.eng}')">حفظ 🤖</button>
                        </div>
                    </td>
                    <td><button class="text-red-500/50 hover:text-red-500" onclick="delWord('${w.eng}')">حذف</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('unit-ai-box').style.display = 'none';
        }

        function startSetup(sMode) {
            mode = sMode;
            selectedUnits = [];
            wordsPool = [];
            sessionWords = [];
            
            document.getElementById('setup-title').innerText = `إعداد: ${sMode === 'dictation' ? 'تسميع' : sMode === 'flashcards' ? 'Flash Cards' : 'امتحان AI 🤖'}`;
            document.getElementById('word-selection-area').style.display = 'none';
            document.getElementById('dictation-options').style.display = sMode === 'dictation' ? 'block' : 'none';
            
            document.querySelectorAll('#setup-unit-grid .unit-item').forEach(el => el.classList.remove('selected'));
            navTo('page-setup');
        }

        function toggleUnit(u, el) {
            if (selectedUnits.includes(u)) {
                selectedUnits = selectedUnits.filter(x => x !== u);
                el.classList.remove('selected');
            } else {
                selectedUnits.push(u);
                el.classList.add('selected');
            }
            renderWordSelection();
        }

        function renderWordSelection() {
            const area = document.getElementById('word-selection-area');
            const list = document.getElementById('word-tag-list');
            
            if (selectedUnits.length === 0) {
                area.style.display = 'none';
                return;
            }
            
            area.style.display = 'block';
            list.innerHTML = '';
            
            wordsPool = words.filter(w => selectedUnits.includes(w.unit));
            sessionWords = [...wordsPool]; 
            
            wordsPool.forEach(w => {
                const tag = document.createElement('div');
                tag.className = 'tag selected';
                tag.innerText = w.eng;
                tag.onclick = () => toggleWord(w, tag);
                list.appendChild(tag);
            });
            updateLaunchBtn();
        }

        function toggleWord(wordObj, el) {
            if (sessionWords.some(w => w.eng === wordObj.eng)) {
                sessionWords = sessionWords.filter(w => w.eng !== wordObj.eng);
                el.classList.remove('selected');
            } else {
                sessionWords.push(wordObj);
                el.classList.add('selected');
            }
            updateLaunchBtn();
        }

        function manageSelection(all) {
            const tags = document.querySelectorAll('#word-tag-list .tag');
            if (all) {
                sessionWords = [...wordsPool];
                tags.forEach(t => t.classList.add('selected'));
            } else {
                sessionWords = [];
                tags.forEach(t => t.classList.remove('selected'));
            }
            updateLaunchBtn();
        }

        function updateLaunchBtn() {
            const btn = document.getElementById('launch-btn');
            btn.disabled = sessionWords.length === 0;
            btn.innerText = `ابدأ النشاط (${sessionWords.length} كلمة) ✨`;
        }

        async function fetchAI(prompt, systemMsg = "") {
            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [
                            { role: "system", content: systemMsg || "أنت مساعد ذكي متخصص في تعليم اللغة الإنجليزية لطلاب الثانوية العامة في مصر. اسمك يوسف محمد. شجع الطالب دائماً ✨" },
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.7
                    })
                });
                const data = await response.json();
                if (data.error) return `خطأ: ${data.error.message}`;
                return data.choices[0].message.content.trim();
            } catch (e) {
                return "خطأ في الاتصال بالذكاء الاصطناعي ✨";
            }
        }

        async function aiSuggestMeaning() {
            const eng = document.getElementById('new-eng').value.trim();
            if(!eng) return;
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "...";
            const res = await fetchAI(`ما هو المعنى العربي الأدق والأكثر شيوعاً لكلمة "${eng}"؟ أجب بكلمة واحدة فقط أو كلمتين باللغة العربية.`);
            document.getElementById('new-arb').value = res.replace(/[.،]/g, '').trim();
            btn.innerText = originalText;
        }

        async function getMnemonic(word) {
            const target = document.getElementById(`mnemonic-${word.replace(/\s/g, '')}`);
            target.innerHTML = '<span class="text-[10px] opacity-50 italic">جاري التفكير 🤖...</span>';
            const res = await fetchAI(`ابتكر جملة قصيرة وذكية لمساعدة الطالب على تذكر معنى كلمة "${word}". اجعل الإجابة باللغة العربية.`);
            target.innerText = "🤖 " + res.trim();
        }

        async function generateUnitStory() {
            if(!activeUnit) return;
            const unitWords = words.filter(w => w.unit === activeUnit).map(w => w.eng).join(', ');
            navTo('page-activity');
            document.getElementById('activity-header').innerText = `قصة الوحدة ${activeUnit} 🤖`;
            document.getElementById('activity-main').innerHTML = '<div class="loading-spinner mx-auto"></div><p class="mt-4 text-sm text-gray-400">جاري كتابة قصة إبداعية... ✨</p>';
            document.getElementById('activity-story').classList.add('hidden');

            const res = await fetchAI(`اكتب قصة قصيرة جداً ومشوقة باللغة الإنجليزية باستخدام هذه الكلمات: [${unitWords}]. ضع الكلمات بين قوسين (Word). ثم اكتب ترجمة ملخصة لها بالعربية.`);
            document.getElementById('activity-main').innerHTML = '';
            document.getElementById('activity-story').classList.remove('hidden');
            document.getElementById('story-content').innerText = res;
        }

        async function askAIChat() {
            const input = document.getElementById('ai-chat-input');
            const box = document.getElementById('ai-chat-response');
            if(!input.value) return;
            const userMsg = input.value;
            input.value = '';
            box.style.display = 'block'; 
            box.innerHTML = '<div class="loading-spinner"></div> يوسف يفكر 🤖...';
            const res = await fetchAI(userMsg);
            box.innerText = res;
        }

        async function getInsight(word) {
            const box = document.getElementById('unit-ai-box');
            box.style.display = 'block'; 
            box.innerHTML = '<div class="loading-spinner"></div> جاري التحليل ✨...';
            const res = await fetchAI(`اشرح كلمة "${word}" باللغة العربية والإنجليزية ببساطة مع مثال واحد فقط.`);
            box.innerText = res;
        }

        async function runActivity() {
            currentIdx = 0; score = 0; isProcessing = false;
            navTo('page-activity');
            document.getElementById('activity-story').classList.add('hidden');
            
            if(mode === 'exam') {
                document.getElementById('activity-main').innerHTML = '<div class="loading-spinner mx-auto"></div><p class="mt-4 text-sm text-gray-400">جاري توليد الأسئلة ذكياً 🤖...</p>';
                await generateAIExam();
            } else {
                sessionWords.sort(() => Math.random() - 0.5);
                showQuestion();
            }
        }

        function showQuestion() {
            const q = sessionWords[currentIdx];
            document.getElementById('activity-header').innerText = `سؤال ${currentIdx + 1} من ${sessionWords.length}`;
            const main = document.getElementById('activity-main');

            if(mode === 'flashcards') {
                main.innerHTML = `<div class="q-text" id="fc-text">${q.eng}</div>
                    <button class="btn w-full" id="reveal-btn" onclick="revealFC('${q.arb}')">كشف المعنى ✨</button>
                    <button class="btn w-full mt-4" id="next-btn" style="display:none;" onclick="nextQ()">التالي ✨</button>`;
            } else {
                const dir = document.getElementById('dict-dir').value;
                const ask = dir === 'arb-eng' ? q.arb : q.eng;
                const target = dir === 'arb-eng' ? q.eng : q.arb;
                main.innerHTML = `<div class="q-text">${ask}</div>
                    <input type="text" id="ans" class="ans-input" placeholder="اكتب الإجابة..." autocomplete="off">
                    <div id="feedback" class="mt-6 font-bold h-6 text-sm"></div>
                    <button id="check-btn" class="btn w-full mt-8" onclick="checkDict('${target}')">تحقق ✨</button>`;
                const input = document.getElementById('ans');
                input.focus();
                input.onkeypress = (e) => { if(e.key === 'Enter') checkDict(target); };
            }
        }

        function checkDict(target) {
            if(isProcessing) return;
            isProcessing = true;
            const val = document.getElementById('ans').value.trim().toLowerCase();
            const fb = document.getElementById('feedback');
            const correct = target.toLowerCase().trim();

            if(val === correct) { 
                fb.innerText = 'صحيح ✨'; fb.style.color = '#fff'; score++; 
            } else { 
                fb.innerText = `خطأ، الإجابة: ${target}`; fb.style.color = '#ff4444'; 
            }
            setTimeout(() => { isProcessing = false; nextQ(); }, 1500);
        }

        function nextQ() {
            currentIdx++;
            const total = mode === 'exam' ? aiQuestions.length : sessionWords.length;
            if(currentIdx < total) {
                mode === 'exam' ? showAIQ() : showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const total = mode === 'exam' ? aiQuestions.length : sessionWords.length;
            const pct = Math.round((score/total)*100);
            document.getElementById('activity-header').innerText = 'انتهى النشاط ✨';
            document.getElementById('activity-main').innerHTML = `
                <div class="score-circle">${score}/${total}</div>
                <h2 class="text-xl font-bold mb-8">النتيجة النهائية: ${pct}%</h2>
                <button class="btn w-full" onclick="goHome()">العودة للرئيسية</button>`;
        }

        async function generateAIExam() {
            const list = sessionWords.map(w => w.eng).join(', ');
            const prompt = `Create exactly 5 Multiple Choice Questions in English based on these vocabulary words: ${list}. 
            Format the output ONLY as a valid JSON object: { "qs": [{"q": "Question here", "opts": ["option1", "option2", "option3", "option4"], "ans": "correct_option"}] }
            Do not include any markdown fences or extra text.`;
            
            const raw = await fetchAI(prompt);
            try {
                let cleaned = raw.replace(/```json/g, '').replace(/```/g, '').trim();
                const parsed = JSON.parse(cleaned);
                aiQuestions = parsed.qs;
                showAIQ();
            } catch(e) { 
                document.getElementById('activity-main').innerHTML = `<p class="text-red-500">🤖 حدث خطأ: يرجى المحاولة مرة أخرى.</p><button class="btn mt-4" onclick="goHome()">رجوع</button>`;
            }
        }

        function showAIQ() {
            const q = aiQuestions[currentIdx];
            document.getElementById('activity-header').innerText = `سؤال AI 🤖 ${currentIdx + 1} من ${aiQuestions.length}`;
            let btns = q.opts.map(o => `<button class="btn btn-outline w-full mb-3 text-sm py-4 justify-start px-6" onclick="checkAI('${o}', this)">${o}</button>`).join('');
            document.getElementById('activity-main').innerHTML = `<div class="q-text text-lg mb-8 leading-relaxed">${q.q}</div><div class="w-full max-w-md">${btns}</div>`;
        }

        function checkAI(choice, btn) {
            if(isProcessing) return;
            isProcessing = true;
            const correct = aiQuestions[currentIdx].ans;
            if(choice === correct) { 
                btn.style.background = '#fff'; btn.style.color = '#000'; score++; 
            } else { 
                btn.style.borderColor = '#ff4444'; btn.style.color = '#ff4444';
            }
            setTimeout(() => { isProcessing = false; nextQ(); }, 1200);
        }

        function openAddModal() { document.getElementById('add-modal').style.display = 'flex'; }
        function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }
        
        function saveNewWord() {
            const eng = document.getElementById('new-eng').value.trim();
            const arb = document.getElementById('new-arb').value.trim();
            const unit = parseInt(document.getElementById('new-unit').value);
            if(eng && arb) {
                words.push({ eng, arb, unit });
                saveData(); renderGrids(); closeAddModal();
                document.getElementById('new-eng').value = '';
                document.getElementById('new-arb').value = '';
            }
        }
        
        function delWord(e) {
            if(confirm('حذف الكلمة؟')) {
                words = words.filter(w => w.eng !== e);
                saveData(); renderGrids();
                if(activeUnit) showUnit(activeUnit);
            }
        }

        function revealFC(val) {
            document.getElementById('fc-text').innerText = val;
            document.getElementById('reveal-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-flex';
        }

        window.onload = init;
    </script>
</body>
</html>
